services:
  ai-mail-agent:
    build: .
    volumes:
      - ./app:/app
      - ./ai_agent_config:/ai_agent_config
    env_file:
      .env
    command: python -u -m app.main
    networks:
      - ai-network

  ollama-ki:
    container_name: ollama-ki
    image: ollama/ollama:latest  # Replace with specific Ollama version if needed
    ports:
      - "11435:11434"
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities: ["gpu"]
            count: all  # Adjust count for the number of GPUs you want to use
    volumes:
      - ./ollama:/root/.ollama
    networks:
      - ai-network


networks:
  ai-network:
    driver: bridge